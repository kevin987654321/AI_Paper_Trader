name: Daily Python Script

on:
  schedule:
    # UTC 時間凌晨 1 點 = 台灣時間早上 9 點
    - cron: '0 1 * * *'
  workflow_dispatch: 
    # 保留手動觸發按鈕，方便你隨時除錯

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # 1. 將你的 GitHub 程式碼拉取到虛擬環境中
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境 (如果你是用其他版本，可以把 3.10 改掉)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 開啟快取，這樣每天跑的時候裝套件會快很多

      # 3. 安裝 requirements.txt 內的套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 執行你的主程式
      - name: Run main.py
        run: |
          python main.py