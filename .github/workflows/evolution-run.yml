name: Weekly AI Evolution Script

on:
  workflow_dispatch: 
    # 同樣保留手動觸發，方便透過 cron-job.org 呼叫

jobs:
  run-evolution:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run evolution.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python evolution.py

      - name: Commit and push new parameters
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 🌟 追蹤 AI 教練寫入的新參數檔
          git add dynamic_config.json || true
          
          # 🌟 強制追蹤並打包「進化歷史日誌」 (加上 -f 防止被 .gitignore 意外擋住)
          git add -f data/evolution_history_log.txt || true
          
          # 檢查是否有未提交的變更，如果有才執行 commit 與 push
          if ! git diff --staged --quiet; then
            git commit -m "🧬 AI 進化完畢：套用新交易參數與保存歷史日誌"
            git push
          else
            echo "沒有任何參數改變與新日誌，略過提交。"
          fi
